<!doctype html>
<html lang="en">
<head>

  <title>Not Found</title>

    body{margin:0;min-height:100vh;display:grid;place-items:center;background:#050506;color:#e5e7eb;font-family:system-ui,-apple-system,Segoe UI,sans-serif;}
    .card{max-width:560px;padding:32px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:rgba(255,255,255,.04);text-align:center;}
    h1{margin:0 0 10px;font-size:24px;}
    p{margin:0;color:#9ca3af;line-height:1.5;}
  </style>
</head>
<body>
  <main class="card">
    <h1>404</h1>
    <p>This page is not available.</p>

</html>
