<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Not Found</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #080c10; color: #7a8e99;
      font-family: monospace; font-size: 14px;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; flex-direction: column; gap: 1rem;
    }
    .code { font-size: 4rem; color: #1a2230; font-weight: bold; }
    .msg  { font-size: 0.85rem; letter-spacing: 0.1em; text-transform: uppercase; }
    a { color: #39ff14; text-decoration: none; font-size: 0.78rem; margin-top: 1rem; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="code">404</div>
  <div class="msg">Page not found</div>
  <a href="/">← Back to Chazdyn.com</a>
</body>
</html>
